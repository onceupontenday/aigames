<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bollywood Beat</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 5px solid #f39c12;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #34495e;
        }
        .score-container {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 10px;
            font-size: 20px;
        }
        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            text-align: center;
            z-index: 100;
            display: none; /* Hidden by default */
        }
        .game-over-screen button {
            padding: 15px 30px;
            font-size: 24px;
            margin-top: 20px;
            cursor: pointer;
            background-color: #f39c12;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .game-over-screen button:hover {
            background-color: #e67e22;
        }
    </style>
</head>
<body>
    <div class="score-container">
        <div>Score: <span id="scoreValue">0</span></div>
        <div>Health: <span id="healthValue">100</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div class="game-over-screen" id="gameOverScreen">
        <h1>Game Over!</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button id="restartButton">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreValue = document.getElementById('scoreValue');
        const healthValue = document.getElementById('healthValue');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');

        const LANE_WIDTH = 100;
        const NUM_LANES = 4;
        const NOTE_SIZE = 30;
        const NOTE_SPEED = 3;
        const HIT_ZONE_Y = canvas.height - 100;
        const HIT_ZONE_HEIGHT = 50;
        const KEYS = ['a', 's', 'd', 'f'];
        const LANE_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f']; // Red, Blue, Green, Yellow

        let score = 0;
        let health = 100;
        let notes = [];
        let gameInterval;
        let noteSpawnInterval;

        function initGame() {
            score = 0;
            health = 100;
            notes = [];
            scoreValue.textContent = score;
            healthValue.textContent = health;
            gameOverScreen.style.display = 'none';
            clearInterval(gameInterval);
            clearInterval(noteSpawnInterval);
            startGame();
        }

        function startGame() {
            gameInterval = setInterval(gameLoop, 1000 / 60); // 60 FPS
            noteSpawnInterval = setInterval(spawnNote, 1000); // Spawn a note every second
        }

        function gameLoop() {
            update();
            draw();
        }

        function spawnNote() {
            const lane = Math.floor(Math.random() * NUM_LANES);
            notes.push({
                x: lane * LANE_WIDTH + (LANE_WIDTH / 2),
                y: -NOTE_SIZE,
                lane: lane,
                color: LANE_COLORS[lane]
            });
        }

        function update() {
            for (let i = 0; i < notes.length; i++) {
                notes[i].y += NOTE_SPEED;

                // Check if note missed
                if (notes[i].y > HIT_ZONE_Y + HIT_ZONE_HEIGHT) {
                    notes.splice(i, 1);
                    i--;
                    health -= 10;
                    healthValue.textContent = health;
                    if (health <= 0) {
                        endGame();
                        return;
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw lanes
            for (let i = 0; i < NUM_LANES; i++) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillRect(i * LANE_WIDTH, 0, LANE_WIDTH, canvas.height);
            }

            // Draw hit zone
            ctx.fillStyle = 'rgba(243, 156, 18, 0.5)'; // Orange
            ctx.fillRect(0, HIT_ZONE_Y, canvas.width, HIT_ZONE_HEIGHT);

            // Draw notes
            for (const note of notes) {
                ctx.fillStyle = note.color;
                ctx.beginPath();
                ctx.arc(note.x, note.y, NOTE_SIZE / 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function handleKeyPress(e) {
            const key = e.key.toLowerCase();
            const laneIndex = KEYS.indexOf(key);

            if (laneIndex !== -1) {
                let hit = false;
                for (let i = 0; i < notes.length; i++) {
                    const note = notes[i];
                    if (note.lane === laneIndex && note.y >= HIT_ZONE_Y && note.y <= HIT_ZONE_Y + HIT_ZONE_HEIGHT) {
                        score += 100;
                        scoreValue.textContent = score;
                        notes.splice(i, 1);
                        hit = true;
                        break;
                    }
                }
                if (!hit) {
                    health -= 5;
                    healthValue.textContent = health;
                    if (health <= 0) {
                        endGame();
                    }
                }
            }
        }

        function endGame() {
            clearInterval(gameInterval);
            clearInterval(noteSpawnInterval);
            finalScore.textContent = score;
            gameOverScreen.style.display = 'flex';
        }

        restartButton.addEventListener('click', initGame);
        window.addEventListener('keydown', handleKeyPress);

        initGame(); // Start the game when the page loads
    </script>
</body>
</html>
